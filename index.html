<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dig Pro — Scorepad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --felt:#1b4d3e; --felt-deep:#123a2e;
    --card:#f4eddd; --card-edge:#e3d8bf; --card-lead:#f8edd0;
    --ink:#17120c; --red:#b81d24; --brass:#c99a3b; --brass-soft:#e7c878;
    --line:rgba(244,237,221,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;color:var(--card);
    background:radial-gradient(120% 90% at 50% -10%, #245c4a 0%, var(--felt) 42%, var(--felt-deep) 100%);
    min-height:100vh;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(0,0,0,.18) 1px,transparent 1px);background-size:4px 4px;opacity:.35;mix-blend-mode:multiply}
  .wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 16px}

  header{padding:24px 0 12px;text-align:center}
  .kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--brass-soft);font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(34px,8vw,56px);line-height:.95;margin:6px 0 2px;letter-spacing:-.01em}
  h1 .suits{font-weight:400;font-size:.6em;vertical-align:middle;margin-left:.18em}
  h1 .s-r{color:var(--red)} h1 .s-b{color:var(--card)}
  .tag{font-size:12.5px;color:rgba(244,237,221,.6)}

  nav{display:flex;gap:6px;justify-content:center;margin:18px auto 22px;background:rgba(0,0,0,.22);padding:5px;border-radius:999px;width:fit-content;border:1px solid var(--line)}
  nav button{font-weight:600;font-size:13.5px;color:rgba(244,237,221,.7);background:none;border:none;padding:9px 15px;border-radius:999px;cursor:pointer;transition:.18s;white-space:nowrap}
  nav button:hover{color:var(--card)}
  nav button.on{background:var(--card);color:var(--felt-deep)}

  .leaguebar{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 auto 20px}
  .lglabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,237,221,.45);font-weight:600}
  .leaguebar select{background:rgba(0,0,0,.25);color:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13.5px;font-weight:600;font-family:"Inter";cursor:pointer;max-width:200px}
  .leaguebar select:focus{outline:2px solid var(--brass)}
  .lgman{background:none;border:1px solid var(--line);color:rgba(244,237,221,.6);border-radius:8px;padding:7px 11px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:"Inter";transition:.15s}
  .lgman:hover{border-color:var(--brass);color:var(--brass-soft)}
  .lgtag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brass-soft);background:rgba(201,154,59,.14);border:1px solid rgba(201,154,59,.3);border-radius:6px;padding:2px 7px;margin-left:8px;vertical-align:middle}
  .filing{margin-top:14px;font-size:12.5px;color:rgba(244,237,221,.5);text-align:center}
  .filing b{color:var(--brass-soft);font-weight:600}
  .saved{margin-top:16px}
  .savedlbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,237,221,.45);font-weight:600;margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .chip .chipname{background:none;border:none;color:var(--card);font-size:13px;font-weight:600;padding:7px 6px 7px 13px;cursor:pointer;font-family:"Inter"}
  .chip .chipname:hover{color:var(--brass-soft)}
  .chip .chipx{background:none;border:none;color:rgba(244,237,221,.35);font-size:15px;cursor:pointer;padding:0 10px 0 4px}
  .chip .chipx:hover{color:var(--red)}
  .lgcode{font-size:11px;color:rgba(244,237,221,.5);letter-spacing:.02em;white-space:nowrap}
  .lgcode b{color:var(--brass-soft);font-family:"Fraunces";letter-spacing:.1em;font-size:13px}
  .auth .authtitle{font-family:"Fraunces";font-weight:600;font-size:25px;margin-bottom:16px;text-align:center}
  .authseg{display:flex;margin-bottom:14px}
  .authseg button{flex:1;text-align:center;padding:10px 0}
  .authfields{display:flex;flex-direction:column;gap:10px;margin:14px 0}
  .authfields input{background:rgba(244,237,221,.95);border:none;border-radius:9px;padding:13px 14px;font-size:16px;color:var(--ink);font-weight:500;font-family:"Inter"}
  .authfields input:focus{outline:2px solid var(--brass)}
  .authdiv{display:flex;align-items:center;gap:10px;color:rgba(244,237,221,.35);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:18px 0 12px}
  .authdiv::before,.authdiv::after{content:"";flex:1;height:1px;background:var(--line)}
  .authalt{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:2px}
  .authalt .rulelink{flex:0 1 auto}
  .auth{position:relative}
  .authclose{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.2);border:1px solid var(--line);color:rgba(244,237,221,.7);width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;line-height:1;transition:.15s}
  .authclose:hover{color:var(--card);border-color:var(--brass)}
  .rulelink{background:none;border:none;color:var(--brass-soft);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0 2px;font-family:"Inter"}
  .rules .ruleshead{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .rules .ruleshead h2{margin:0}
  .rules .ruleshead .btn{padding:9px 18px}
  .rrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .rrow label{font-size:14px;color:rgba(244,237,221,.85);font-weight:500}
  .rrow.sub2{padding:9px 0 9px 14px}
  .rrow.sub2 label{font-size:13px;color:rgba(244,237,221,.6);font-weight:400}
  .rsec{margin:4px 0;padding:2px 0}
  .rnum{width:84px;background:rgba(244,237,221,.95);border:none;border-radius:8px;padding:9px 10px;font-size:15px;font-weight:600;color:var(--ink);text-align:center;font-family:"Fraunces";font-variant-numeric:tabular-nums}
  .rnum:focus{outline:2px solid var(--brass)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:0 0 auto}
  .seg button{background:rgba(0,0,0,.2);border:none;color:rgba(244,237,221,.6);font-size:12.5px;font-weight:600;padding:8px 14px;cursor:pointer;font-family:"Inter";transition:.12s}
  .seg button.on{background:var(--brass);color:var(--felt-deep)}
  .rnote{font-size:11.5px;color:rgba(244,237,221,.5);padding:8px 0 2px;line-height:1.45}
  .mtbl tr.mrow td{color:#cdb27a}

  /* ---------- live scorepad ---------- */
  .roundlbl{text-align:center;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,237,221,.65);margin-bottom:6px}
  .roundlbl b{color:var(--brass-soft);font-weight:700}
  .helpline{text-align:center;font-size:11.5px;color:rgba(244,237,221,.5);margin:0 auto 14px;line-height:1.45;max-width:420px}
  .helpline b{color:var(--brass-soft);font-weight:600}
  .sheet{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .stbl{border-collapse:separate;border-spacing:6px 0;width:100%;min-width:300px}
  .gut{width:26px;min-width:26px;text-align:center;color:rgba(244,237,221,.5);font-family:"Fraunces";font-weight:600;font-size:13px;position:sticky;left:0;background:transparent;z-index:2}
  thead .gut{vertical-align:bottom;padding-bottom:8px;font-size:10px;letter-spacing:.1em;color:rgba(244,237,221,.4)}

  .pcol{background:var(--card);border-radius:12px 12px 0 0;padding:11px 6px 9px;vertical-align:bottom;text-align:center;position:relative;animation:deal .4s cubic-bezier(.2,.8,.25,1) backwards}
  .pcol:nth-child(3){animation-delay:.05s} .pcol:nth-child(4){animation-delay:.1s} .pcol:nth-child(5){animation-delay:.15s}
  @keyframes deal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .pcol .su{font-size:16px;line-height:1}
  .pcol .nm{font-weight:700;font-size:12.5px;color:#4a3d2c;margin:3px 0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcol .tot{font-family:"Fraunces";font-weight:900;font-size:clamp(26px,7vw,34px);line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .pcol .tot.bump{animation:bump .35s ease}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.16);color:var(--red)}100%{transform:scale(1)}}
  .pcol .pen{font-family:"Inter";font-weight:700;font-size:11px;color:var(--red);letter-spacing:.03em;min-height:13px;margin-top:1px}
  .pcol.lead{background:var(--card-lead);box-shadow:inset 0 3px 0 var(--brass)}
  .pcol .crown{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:13px;opacity:0;transition:.2s}
  .pcol.lead .crown{opacity:1}

  td.cell{background:var(--card);padding:0;text-align:center;vertical-align:top}
  td.cell.lead{background:var(--card-lead)}
  tbody tr:last-child td.cell{border-radius:0 0 12px 12px}
  td.cell.ginon{box-shadow:inset 0 -3px 0 var(--brass)}
  .ci{width:100%;height:36px;border:none;background:none;text-align:center;font-family:"Fraunces";font-weight:600;font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(0,0,0,.07)}
  .ci:focus{outline:none;background:rgba(201,154,59,.16)}
  .ci::placeholder{color:rgba(0,0,0,.16);font-weight:400}
  .ci::-webkit-outer-spin-button,.ci::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .cellctl{display:flex;align-items:stretch}
  .signbtn{flex:0 0 36%;border:none;background:none;cursor:pointer;font-family:"Inter";font-weight:700;font-size:13px;color:rgba(0,0,0,.26);padding:3px 0 6px;line-height:1;border-right:1px solid rgba(0,0,0,.06);transition:.12s}
  .signbtn:hover{color:var(--red)}
  .signbtn.neg{color:var(--red)}
  .ginbtn{flex:1;border:none;background:none;cursor:pointer;font-family:"Inter";font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.2);padding:3px 0 6px;transition:.12s;line-height:1}
  .ginbtn:hover{color:var(--red)}
  .ginbtn.on{color:var(--brass)}
  .ginbtn.trig{color:var(--felt-deep)}
  .ginbtn.trig::after{content:" ✦"}

  .bar{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
  .btn{font-weight:600;font-size:14px;border-radius:10px;padding:12px 20px;cursor:pointer;border:1px solid var(--line);transition:.16s}
  .btn-primary{background:var(--brass);color:var(--felt-deep);border-color:var(--brass)}
  .btn-primary:hover{background:var(--brass-soft)}
  .btn-primary.ready{animation:glow 1.6s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(201,154,59,.5)}50%{box-shadow:0 0 0 7px rgba(201,154,59,0)}}
  .btn-ghost{background:rgba(0,0,0,.18);color:var(--card)}
  .btn-ghost:hover{background:rgba(0,0,0,.3)}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-danger:hover{background:#9d1820}
  .modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(8,22,17,.62);animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .mcard{background:var(--felt);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:340px;width:100%;box-shadow:0 22px 55px rgba(0,0,0,.55);animation:deal .22s cubic-bezier(.2,.8,.25,1)}
  .mcard h3{font-family:"Fraunces";font-weight:600;font-size:21px;margin-bottom:8px}
  .mcard p{font-size:14px;color:rgba(244,237,221,.72);line-height:1.5;margin-bottom:18px}
  .mbtns{display:flex;gap:10px}
  .mbtns .btn{flex:1}

  .pensum{margin-top:14px;text-align:center;font-size:12.5px;color:rgba(244,237,221,.7);line-height:1.6}
  .pensum .ev b{color:var(--brass-soft);font-weight:600} .pensum .ev .v{color:#f0a6a0;font-weight:600}

  /* ---------- setup ---------- */
  .panel{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:16px;padding:22px}
  .panel h2{font-family:"Fraunces";font-weight:600;font-size:22px;margin-bottom:4px}
  .panel p.sub{color:rgba(244,237,221,.6);font-size:13.5px;margin-bottom:18px}
  .panel p.sub .note{display:block;margin-top:6px;color:rgba(244,237,221,.45);font-size:12px}
  .seat{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .seat .ord{font-family:"Fraunces";font-weight:600;color:rgba(244,237,221,.4);font-size:13px;width:16px;text-align:center}
  .seat .suit{font-size:22px;width:28px;text-align:center;cursor:pointer;user-select:none;transition:.12s}
  .seat .suit:hover{transform:scale(1.2)}
  .seat input{flex:1;background:rgba(244,237,221,.95);border:none;border-radius:9px;padding:12px 14px;font-size:15px;color:var(--ink);font-weight:500}
  .seat input:focus{outline:2px solid var(--brass)}
  .seat .rm{background:none;border:none;color:rgba(244,237,221,.45);font-size:20px;cursor:pointer;padding:0 4px}
  .seat .rm:hover{color:var(--red)}
  .addseat{background:none;border:1px dashed var(--line);color:rgba(244,237,221,.7);width:100%;padding:11px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;margin-top:4px}
  .addseat:hover{border-color:var(--brass);color:var(--brass-soft)}
  .s-red{color:var(--red)} .s-blk{color:var(--card)}

  /* ---------- history ---------- */
  .empty{text-align:center;padding:60px 20px;color:rgba(244,237,221,.55)}
  .empty .big{font-size:40px;margin-bottom:10px;opacity:.6}
  .empty strong{display:block;font-family:"Fraunces";font-size:20px;color:rgba(244,237,221,.85);margin-bottom:8px}
  .empty p{font-size:15px;max-width:330px;margin:0 auto;line-height:1.5}

  .game{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:14px;padding:15px 14px;margin-bottom:12px}
  .game .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;padding:0 2px}
  .game .when{font-size:12px;color:rgba(244,237,221,.55);white-space:nowrap;flex:0 0 auto;padding-top:2px}
  .titles{display:flex;flex-direction:column;gap:3px}
  .game .champ{font-family:"Fraunces";font-weight:600;font-size:15px;color:var(--brass-soft)}
  .game .bottom{font-family:"Fraunces";font-weight:600;font-size:13px;color:rgba(244,237,221,.5)}
  .game .bottom.deep{color:#e6857f}
  .mini{overflow-x:auto}
  .mtbl{border-collapse:collapse;width:100%;min-width:280px;font-variant-numeric:tabular-nums}
  .mtbl th,.mtbl td{padding:6px 4px;text-align:center;font-size:12.5px;border-bottom:1px solid var(--line)}
  .mtbl thead th{font-size:11px;color:rgba(244,237,221,.8);font-weight:700;border-bottom:1px solid rgba(244,237,221,.25)}
  .mtbl thead th .su{font-size:13px;display:block}
  .mtbl .rg{color:rgba(244,237,221,.4);font-family:"Fraunces";width:22px}
  .mtbl td.v{color:rgba(244,237,221,.85);position:relative}
  .mtbl td.v.zero{color:rgba(244,237,221,.3)}
  .mtbl td.v.gin{color:var(--brass-soft);font-weight:700}
  .mtbl td.v.gin::after{content:"✦";font-size:8px;position:absolute;top:3px;right:3px;color:var(--brass)}
  .mtbl tr.penrow td{color:#f0a6a0;font-weight:600;font-size:11px;border-bottom:1px solid var(--line)}
  .mtbl tr.penrow td.rg{color:rgba(244,237,221,.4)}
  .mtbl tfoot td{font-family:"Fraunces";font-weight:700;font-size:15px;border-top:2px solid rgba(244,237,221,.3);border-bottom:none;padding-top:8px;color:var(--card)}
  .mtbl th.wcol,.mtbl tfoot td.wcol{color:var(--brass-soft)}
  .mtbl th.bcol,.mtbl tfoot td.bcol{color:#e6857f}

  /* ---------- leaderboard ---------- */
  .lb{width:100%;border-collapse:collapse}
  .lb th{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,237,221,.5);font-weight:600;text-align:right;padding:0 9px 12px}
  .lb th:first-child,.lb td:first-child{text-align:left}
  .lb th.rank,.lb td.rank{text-align:center;width:32px;padding-left:0}
  .lb td{padding:13px 9px;border-top:1px solid var(--line);font-size:14px;text-align:right}
  .lb .rk{font-family:"Fraunces";font-weight:700;font-size:17px;color:rgba(244,237,221,.5)}
  .lb tr.first .rk{color:var(--brass)}
  .lb .player{display:flex;align-items:center;gap:9px;text-align:left}
  .lb .player .su{font-size:15px}
  .lb .player .nm{font-weight:600}
  .lb tr.first .player .nm{color:var(--card)}
  .lb .wins{font-family:"Fraunces";font-weight:700;font-size:18px;color:var(--card);font-variant-numeric:tabular-nums}
  .lb tr.first .wins{color:var(--brass-soft)}
  .lb .dim{color:rgba(244,237,221,.6);font-variant-numeric:tabular-nums}
  @media(max-width:560px){.lb .hide-sm{display:none}}

  .footer{text-align:center;margin-top:26px}
  .svc{display:block;font-size:11px;letter-spacing:.03em;margin-bottom:11px;min-height:13px;color:rgba(244,237,221,.38);transition:color .2s}
  .svc[data-s="off"]{color:#e6b07f}
  .reset{background:none;border:none;color:rgba(244,237,221,.4);font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .reset:hover{color:var(--red)}
  .hidden{display:none}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Score Keeper</div>
    <h1>Dig Pro<span class="suits"><span class="s-b">♠</span><span class="s-r">♥</span><span class="s-r">♦</span><span class="s-b">♣</span></span></h1>
    <div class="tag" id="tagline">Ten rounds · highest total wins</div>
  </header>

  <nav>
    <button data-view="game" class="on">This Game</button>
    <button data-view="history">Past Games</button>
    <button data-view="leaderboard">Leaderboard</button>
  </nav>

  <div class="leaguebar hidden" id="leaguebar"></div>

  <main id="main"><div class="empty"><p>Shuffling…</p></div></main>

  <div class="footer hidden" id="footer">
    <span class="svc" id="saveStatus"></span>
    <button class="rulelink" id="acctBtn">Sign in</button>
    <button class="rulelink" id="rulesOpen">Rules</button>
    <button class="reset" id="resetBtn">Clear all data</button>
  </div>
</div>

<script>
const SUITS=[{c:"♠",k:"blk"},{c:"♥",k:"red"},{c:"♦",k:"red"},{c:"♣",k:"blk"}];

/* ======================================================================
   CLOUD SIGN-IN (Supabase) — paste your two project values below.
   Get them in Supabase → Project Settings → API.
   Leave blank to run fully local (no sign-in). Setup SQL: supabase-setup.sql
   ====================================================================== */
const SUPABASE_URL = "";        // ← your Project URL,  e.g. https://abcd.supabase.co
const SUPABASE_ANON_KEY = "";   // ← your anon public key (safe to embed; protected by RLS)
const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let user=null, savedPlayers=[], authMode="in", recoveryMode=false;
function cloudOn(){ return !!(sb && user); }
const K_ACTIVE="gin:active", K_HIST="gin:history", K_ROSTER="gin:roster", K_LEAGUES="gin:leagues", K_RULES="gin:rules", K_PLAYERS="gin:players";
const DEFAULT_RULES={rounds:10, winHigh:true, ginEnabled:true, ginStreak:3, ginFirst:100, ginStack:true, ginStepSmall:50, ginStepBig:100, bottomTitles:true, milestoneEnabled:true, milestoneThreshold:1000, milestonePenalty:100};
let rules=Object.assign({},DEFAULT_RULES);
let ROUNDS=rules.rounds;   // the configured rounds for NEW games (existing games keep their own count)

let active=null, history=[], view="game", roster=[], leagueState={leagues:[],current:"all"};
let curPen={pen:{},events:[]}; // recomputed each game render, drives partial refresh

/* Storage backend: use Claude's artifact storage when present (inside Claude),
   otherwise fall back to the browser's localStorage (when self-hosted, e.g. Vercel).
   Shared (cross-user) scope only truly syncs under artifact storage. */
const _ls = (()=>{ try{ localStorage.setItem("__gin_t","1"); localStorage.removeItem("__gin_t"); return localStorage; }catch(e){ return null; } })();
function _useArtifact(){ return typeof window!=="undefined" && window.storage && window.storage.get; }
async function _bGet(key,shared){
  if(_useArtifact()){ const r = shared ? await window.storage.get(key,true) : await window.storage.get(key); return r?r.value:null; }
  if(_ls) return _ls.getItem(key);
  return null;
}
async function _bSet(key,value,shared){
  if(_useArtifact()){ if(shared) await window.storage.set(key,value,true); else await window.storage.set(key,value); return; }
  if(_ls){ _ls.setItem(key,value); return; }
  throw new Error("no storage");
}
async function _bDel(key,shared){
  if(_useArtifact()){ if(shared) await window.storage.delete(key,true); else await window.storage.delete(key); return; }
  if(_ls){ _ls.removeItem(key); return; }
}

/* Resilient persistence: state always lives in memory; saving is best-effort,
   debounced and retried, and never throws a visible error. */
const _timers={};
function _status(s){const el=document.getElementById("saveStatus"); if(!el)return; el.dataset.s=s;
  el.textContent = s==="saving" ? "Saving…" : s==="ok" ? "Saved on this device" : "Not saving — keep this tab open to avoid losing scores";}
async function _write(key,attempt=0){
  const obj = key===K_ACTIVE ? active : key===K_HIST ? history : key===K_ROSTER ? roster : key===K_LEAGUES ? leagueState : key===K_RULES ? rules : key===K_PLAYERS ? savedPlayers : undefined;
  try{
    if(obj===null || obj===undefined) await _bDel(key);
    else await _bSet(key, JSON.stringify(obj));
    _status("ok");
  }catch(e){
    if(attempt<2){ setTimeout(()=>_write(key,attempt+1), 250*(attempt+1)); return; }
    _status("off");
  }
}
function saveKey(key){ _status("saving"); clearTimeout(_timers[key]); _timers[key]=setTimeout(()=>_write(key),300); }
function saveNow(key){ clearTimeout(_timers[key]); return _write(key); }
function cancelSave(key){ clearTimeout(_timers[key]); }
async function loadKey(k){ try{ const v=await _bGet(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
async function delKey(k){ cancelSave(k); try{ await _bDel(k); }catch(e){} }

/* ======================= CLOUD (Supabase) =======================
   When signed in, the user's rules, saved players, leagues and finished
   games live in Supabase. League games are visible to fellow league members
   (enforced by the database). Signed out, everything stays local. */
async function cloudInit(){
  if(!sb) return;
  try{
    const {data}=await sb.auth.getSession(); user=data.session?.user||null;
    sb.auth.onAuthStateChange(async (evt,session)=>{
      const before=user&&user.id; user=session?.user||null;
      if(evt==="PASSWORD_RECOVERY"){ recoveryMode=true; view="account"; }
      if((user&&user.id)!==before){ if(user){ await loadCloud(); } else { await loadLocal(); } }
      updateAccountBar(); if(view==="account") render();
    });
    if(user) await loadCloud();
  }catch(e){ console.warn("cloud init", e); }
}
async function loadCloud(){
  if(!cloudOn()) return;
  try{
    const [r,pl,lg,gm] = await Promise.all([
      sb.from("rules").select("data").eq("user_id",user.id).maybeSingle(),
      sb.from("players").select("*").eq("owner",user.id).order("created_at"),
      sb.from("leagues").select("*"),
      sb.from("games").select("*").order("played_at",{ascending:false})
    ]);
    if(r.data&&r.data.data){ rules=Object.assign({},DEFAULT_RULES,r.data.data); ROUNDS=rules.rounds; }
    else { await sb.from("rules").upsert({user_id:user.id, data:rules}); }   // seed cloud with current rules
    savedPlayers=(pl.data||[]).map(x=>({id:x.id,name:x.name,suit:x.suit||0}));
    leagueState.leagues=(lg.data||[]).map(l=>({id:l.id,name:l.name,code:l.join_code,owner:l.owner}));
    if(leagueState.current!=="all" && !leagueState.leagues.some(l=>l.id===leagueState.current)) leagueState.current="all";
    history=(gm.data||[]).map(g=>Object.assign({},g.data,{id:g.id,leagueId:g.league_id,_owner:g.owner}));
    history.forEach(g=>g.players&&g.players.forEach(p=>addToRoster(p.name)));
  }catch(e){ console.warn("cloud load", e); }
  updateAccountBar(); render();
}
async function loadLocal(){   // when a user signs out, fall back to this device's data
  history=(await loadKey(K_HIST))||[];
  const ls=await loadKey(K_LEAGUES); leagueState = (ls&&ls.leagues)?ls:{leagues:[],current:"all"};
  savedPlayers=(await loadKey(K_PLAYERS))||[];
  rules=Object.assign({},DEFAULT_RULES, await loadKey(K_RULES)||{}); ROUNDS=rules.rounds;
  updateAccountBar(); render();
}
/* cloud writers (no-ops when signed out) */
async function cloudSaveRules(){ if(!cloudOn())return; try{ await sb.from("rules").upsert({user_id:user.id,data:rules,updated_at:new Date().toISOString()}); }catch(e){console.warn(e);} }
async function cloudSaveGame(rec){ if(!cloudOn())return rec; try{
  const {data,error}=await sb.from("games").insert({owner:user.id, league_id: rec.leagueId||null,
    data:{players:rec.players,winners:rec.winners,rounds:rec.rounds,date:rec.date}}).select("id").single();
  if(!error&&data) rec.id=data.id;
}catch(e){console.warn(e);} return rec; }
async function cloudAddPlayer(p){ if(!cloudOn())return; try{ const {data}=await sb.from("players").insert({owner:user.id,name:p.name,suit:p.suit||0}).select("id").single(); if(data)p.id=data.id; }catch(e){console.warn(e);} }
async function cloudDelPlayer(id){ if(!cloudOn()||!id)return; try{ await sb.from("players").delete().eq("id",id); }catch(e){console.warn(e);} }
async function cloudCreateLeague(name,code){ if(!cloudOn())return null; try{ const {data,error}=await sb.from("leagues").insert({owner:user.id,name,join_code:code}).select("*").single(); if(error)throw error; return data; }catch(e){ alert("Couldn't create league in the cloud: "+(e.message||e)); return null; } }
async function cloudJoinLeague(code){ if(!cloudOn())return null; try{ const {data,error}=await sb.rpc("join_league",{p_code:code}); if(error)throw error; return data; }catch(e){ alert(e.message||"Couldn't join — check the code."); return null; } }
async function cloudDeleteLeague(id){ if(!cloudOn())return; try{ await sb.from("leagues").delete().eq("id",id); }catch(e){console.warn(e);} }

/* auth UI */
async function sendMagicLink(email){
  if(!sb){ authMsgSet("Cloud isn’t set up on this copy yet — add your Supabase keys (see README) to use sign-in links."); return; }
  const {error}=await sb.auth.signInWithOtp({email, options:{emailRedirectTo:location.href.split("#")[0]}});
  const el=document.getElementById("authMsg");
  if(el) el.textContent = error ? ("Error: "+error.message) : "Check your email for the sign-in link.";
}
async function signOut(){ if(sb){ await sb.auth.signOut(); } }
function updateAccountBar(){
  const el=document.getElementById("acctBtn"); if(!el) return;
  if(!sb){ el.textContent="Sign in"; el.title="Cloud not configured"; return; }
  el.textContent = user ? (user.email||"Account") : "Sign in";
}


async function init(){
  rules=Object.assign({},DEFAULT_RULES, await loadKey(K_RULES)||{}); ROUNDS=rules.rounds;
  active=await loadKey(K_ACTIVE);
  if(active && !active.rounds) active.rounds = active.players[0] ? active.scores[active.players[0].id].length : ROUNDS;
  if(active && !active.gins){active.gins={}; active.players.forEach(p=>active.gins[p.id]=Array(active.rounds).fill(false));}
  history=(await loadKey(K_HIST))||[];
  roster=(await loadKey(K_ROSTER))||[];
  const ls=await loadKey(K_LEAGUES); if(ls&&ls.leagues) leagueState=ls;
  if(!leagueState.leagues) leagueState.leagues=[];
  if(leagueState.current!=="all" && !leagueState.leagues.some(l=>l.id===leagueState.current)) leagueState.current="all";
  savedPlayers=(await loadKey(K_PLAYERS))||[];
  history.slice().reverse().forEach(g=>g.players.forEach(p=>addToRoster(p.name)));  // seed from past games
  saveNow(K_ROSTER);
  document.getElementById("footer").classList.remove("hidden"); render();
  await cloudInit(); updateAccountBar();
  if(!user && !guestChosen()){ view="account"; render(); }   // first-run: sign in / sign up / guest
}
function addToRoster(name){
  name=(name||"").trim();
  if(!name || /^Player \d+$/i.test(name)) return;
  const lc=name.toLowerCase();
  roster=roster.filter(n=>n.toLowerCase()!==lc);
  roster.unshift(name);
  if(roster.length>40) roster.length=40;
}

/* ---------- leagues (local groups/competitions) ---------- */
function leagueName(id){ const l=leagueState.leagues.find(x=>x.id===id); return l?l.name:""; }
function gamesInLeague(){ return leagueState.current==="all" ? history : history.filter(g=>g.leagueId===leagueState.current); }
function genJoinCode(){const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<5;i++)s+=a[Math.floor(Math.random()*a.length)];return s;}
async function createLeague(){
  const name=(prompt("Name this league / group (e.g. Friday Crew):")||"").trim();
  if(!name){ renderLeagueBar(); return; }
  if(cloudOn()){
    const code=genJoinCode(); const row=await cloudCreateLeague(name,code);
    if(!row){ render(); return; }
    leagueState.leagues.push({id:row.id,name:row.name,code:row.join_code,owner:row.owner});
    leagueState.current=row.id; saveNow(K_LEAGUES); render();
  } else {
    const id="lg_"+Date.now().toString(36);
    leagueState.leagues.push({id,name,createdAt:Date.now()});
    leagueState.current=id; saveNow(K_LEAGUES); render();
  }
}
async function joinLeaguePrompt(){
  if(!cloudOn()){ alert("Sign in first to join a league by code."); renderLeagueBar(); return; }
  const code=(prompt("Enter the league's join code:")||"").trim();
  if(!code){ renderLeagueBar(); return; }
  const row=await cloudJoinLeague(code);
  if(!row){ render(); return; }
  if(!leagueState.leagues.some(l=>l.id===row.id)) leagueState.leagues.push({id:row.id,name:row.name,code:row.join_code,owner:row.owner});
  leagueState.current=row.id; saveNow(K_LEAGUES);
  await loadCloud();   // pull the league's shared games
}
function renameLeague(){
  if(leagueState.current==="all") return;
  const l=leagueState.leagues.find(x=>x.id===leagueState.current); if(!l) return;
  const name=(prompt("Rename league:",l.name)||"").trim();
  if(name){ l.name=name; saveNow(K_LEAGUES); if(cloudOn()&&l.owner===user.id) sb.from("leagues").update({name}).eq("id",l.id); render(); }
}
function deleteLeague(){
  if(leagueState.current==="all") return;
  const l=leagueState.leagues.find(x=>x.id===leagueState.current); if(!l) return;
  const owned = !cloudOn() || l.owner===user.id;
  if(!confirm(owned?`Delete the league “${l.name}”? Its games are kept but moved to “All games”.`:`Leave the league “${l.name}”?`)) return;
  if(cloudOn()){
    if(owned){ cloudDeleteLeague(l.id); } else { sb.from("league_members").delete().eq("league_id",l.id).eq("user_id",user.id); }
  }
  history.forEach(g=>{ if(g.leagueId===l.id) g.leagueId=null; });
  leagueState.leagues=leagueState.leagues.filter(x=>x.id!==l.id);
  leagueState.current="all"; saveNow(K_LEAGUES); saveNow(K_HIST); render();
}
function renderLeagueBar(){
  const el=document.getElementById("leaguebar"); if(!el) return;
  el.classList.remove("hidden");
  const cur=leagueState.current; const curL=leagueState.leagues.find(l=>l.id===cur);
  const opts = `<option value="all">All games</option>`
    + leagueState.leagues.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join("")
    + `<option value="__new">+ New league…</option>`
    + (sb?`<option value="__join">↳ Join by code…</option>`:"");
  el.innerHTML = `<span class="lglabel">League</span><select id="leagueSel">${opts}</select>`
    + (cur!=="all"?`<button class="lgman" id="lgRename">Rename</button><button class="lgman" id="lgDelete">${(cloudOn()&&curL&&curL.owner!==user.id)?"Leave":"Delete"}</button>`:"")
    + (cur!=="all"&&curL&&curL.code?`<span class="lgcode">code <b>${esc(curL.code)}</b></span>`:"");
  const sel=document.getElementById("leagueSel"); sel.value=cur;
  sel.onchange=()=>{ const v=sel.value; if(v==="__new"){ createLeague(); } else if(v==="__join"){ joinLeaguePrompt(); } else { leagueState.current=v; saveNow(K_LEAGUES); render(); } };
  const rn=document.getElementById("lgRename"); if(rn) rn.onclick=renameLeague;
  const dl=document.getElementById("lgDelete"); if(dl) dl.onclick=deleteLeague;
}

function accountHTML(){

function authMsgSet(t){ const el=document.getElementById("authMsg"); if(el) el.textContent=t; }
async function authSubmit(){
  if(!sb){ authMsgSet("Cloud sign-in isn’t set up on this copy — tap Continue as guest, or add your Supabase keys (README) to enable accounts."); return; }
  const email=(document.getElementById("authEmail")||{}).value, pass=(document.getElementById("authPass")||{}).value;
  const e=(email||"").trim();
  if(!e||!pass){ authMsgSet("Enter your email and a password."); return; }
  if(authMode==="up" && pass.length<6){ authMsgSet("Use at least 6 characters for your password."); return; }
  authMsgSet("Working…");
  try{
    const res = authMode==="up" ? await sb.auth.signUp({email:e,password:pass}) : await sb.auth.signInWithPassword({email:e,password:pass});
    if(res.error){ authMsgSet(res.error.message); return; }
    if(authMode==="up" && !res.data.session){ authMsgSet("Account created — check your email to confirm, then come back and sign in."); return; }
    try{ localStorage.setItem("gin:guest","1"); }catch(_){}   // they have an account now; don't re-gate
    view="game"; setTab("game"); render();   // onAuthStateChange will also pull cloud data
  }catch(err){ authMsgSet(err.message||"Something went wrong."); }
}
function continueAsGuest(){ try{ localStorage.setItem("gin:guest","1"); }catch(e){} view="game"; setTab("game"); render(); }
function guestChosen(){ try{ return localStorage.getItem("gin:guest")==="1"; }catch(e){ return false; } }
async function forgotPassword(){
  if(!sb){ authMsgSet("Cloud isn’t set up on this copy yet — password reset needs your Supabase keys (see README)."); return; }
  const e=((document.getElementById("authEmail")||{}).value||"").trim();
  if(!e){ authMsgSet("Type your email above first, then tap Forgot password."); return; }
  authMsgSet("Sending…");
  try{ const {error}=await sb.auth.resetPasswordForEmail(e,{redirectTo:location.href.split("#")[0]});
    authMsgSet(error?error.message:"Check your email for a reset link."); }
  catch(err){ authMsgSet(err.message||"Couldn't send the reset email."); }
}
async function updatePassword(){
  const np=(document.getElementById("newPass")||{}).value;
  if(!np||np.length<6){ authMsgSet("Use at least 6 characters."); return; }
  authMsgSet("Updating…");
  try{ const {error}=await sb.auth.updateUser({password:np}); if(error){ authMsgSet(error.message); return; }
    recoveryMode=false; view="game"; setTab("game"); render(); }
  catch(e){ authMsgSet(e.message||"Couldn't update the password."); }
}
function wireAccount(){
  const done=document.getElementById("acctDone"); if(done) done.onclick=()=>{ view="game"; setTab("game"); render(); };
  const so=document.getElementById("signOut"); if(so) so.onclick=signOut;
  document.querySelectorAll("[data-auth]").forEach(b=>b.onclick=()=>{ authMode=b.dataset.auth; render(); });
  const go=document.getElementById("authGo"); if(go) go.onclick=authSubmit;
  const ml=document.getElementById("magicLink"); if(ml) ml.onclick=()=>{ const e=(document.getElementById("authEmail")||{}).value; if(!e||!e.trim()){authMsgSet("Enter your email first.");return;} sendMagicLink(e.trim()); };
  const gb=document.getElementById("guestBtn"); if(gb) gb.onclick=continueAsGuest;
  const ac=document.getElementById("authClose"); if(ac) ac.onclick=continueAsGuest;
  const fp=document.getElementById("forgotPw"); if(fp) fp.onclick=forgotPassword;
  const upw=document.getElementById("updatePw"); if(upw) upw.onclick=updatePassword;
  const pw=document.getElementById("authPass"); if(pw) pw.onkeydown=(ev)=>{ if(ev.key==="Enter") authSubmit(); };
  const npw=document.getElementById("newPass"); if(npw) npw.onkeydown=(ev)=>{ if(ev.key==="Enter") updatePassword(); };
}
document.getElementById("resetBtn").onclick=async()=>{
  if(!confirm("Clear the current game, all past games, and the leaderboard? This can't be undone.")) return;
  active=null; history=[]; leagueState={leagues:[],current:"all"};
  await delKey(K_ACTIVE); await saveNow(K_HIST); await saveNow(K_LEAGUES);
  view="game"; setTab("game"); render();
};

function render(){
  const m=document.getElementById("main"), lb=document.getElementById("leaguebar");
  updateTagline();
  if(view==="rules"){ lb.classList.add("hidden"); m.innerHTML=rulesHTML(); wireRules(); return; }
  if(view==="account"){ lb.classList.add("hidden"); m.innerHTML=accountHTML(); wireAccount(); return; }
  renderLeagueBar();
  if(view==="game"){ if(active){m.innerHTML=gameHTML();wireGame();} else {m.innerHTML=setupHTML();wireSetup();} }
  else if(view==="history") m.innerHTML=historyHTML();
  else m.innerHTML=leaderboardHTML();
}

function wireRules(){

/* ---------- the GIN penalty rule ----------
   order = [{key, gins:[bool x ROUNDS]}] in seating order.
   A run of consecutive gins by ONE player (only ANOTHER player's gin breaks the
   run; an ordinary round does not) penalizes the player seated BEFORE them
   (previous seat, wrapping). Penalties STACK as the run grows:
     3rd in a row -> 100, then 50, 50, 100, 50, 50, 100 … for each further gin. */
function ginIncrement(n){            // penalty added the moment a run reaches length n
  if(!rules.ginEnabled) return 0;
  if(n<rules.ginStreak) return 0;
  if(n===rules.ginStreak) return rules.ginFirst;      // the trigger gin
  if(!rules.ginStack) return 0;                        // stacking off → only the trigger
  return ((n-(rules.ginStreak+1))%3===2) ? rules.ginStepBig : rules.ginStepSmall; // …small,small,big repeating
}
function calcPenalties(order){
  const R = order.reduce((m,o)=>Math.max(m,(o.gins||[]).length),0);
  const pen={}; order.forEach(o=>pen[o.key]=0);
  const events=[];
  let streakKey=null, streak=0;
  for(let r=0;r<R;r++){
    const ginners=order.filter(o=>o.gins&&o.gins[r]).map(o=>o.key);
    if(ginners.length===0) continue;            // no gin this round -> run survives
    if(ginners.length===1){
      const g=ginners[0];
      if(g===streakKey){ streak++; } else { streakKey=g; streak=1; }
      const inc=ginIncrement(streak);
      if(inc>0){
        const idx=order.findIndex(o=>o.key===g);
        const victim=order[(idx-1+order.length)%order.length].key;
        pen[victim]-=inc;
        events.push({round:r, ginner:g, victim, amount:inc, streak});
      }
    } else { streakKey=null; streak=0; }         // two gins same round -> reset
  }
  return {pen,events};
}
function ord(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

/* ---------- rule-aware scoring helpers ---------- */
function gR(g){ return g.rounds || (g.players[0]?g.players[0].rounds.length:ROUNDS); }
function bestOf(tots){ return rules.winHigh?Math.max(...tots):Math.min(...tots); }   // winner's score
function worstOf(tots){ return rules.winHigh?Math.min(...tots):Math.max(...tots); }  // bottom's score
/* End-of-game 1000 rule: any player finishing ABOVE the threshold docks the player
   seated before them (turn order, wrapping). Returns per-seat deductions. */
function milestonePenalties(tots){
  const n=tots.length, pen=new Array(n).fill(0);
  if(!rules.milestoneEnabled) return pen;
  for(let i=0;i<n;i++){ if(tots[i]>rules.milestoneThreshold) pen[(i-1+n)%n]-=rules.milestonePenalty; }
  return pen;
}
/* Totals for a FINISHED game = round sums + gin penalties + 1000-rule penalties. */
function finalTotals(g){
  const order=g.players.map((p,i)=>({key:i,gins:p.gins||Array(p.rounds.length).fill(false)}));
  const {pen,events}=calcPenalties(order);
  const afterGin=g.players.map((p,i)=>sumRounds(p.rounds)+(pen[i]||0));
  const mpen=milestonePenalties(afterGin);
  const totals=afterGin.map((t,i)=>t+mpen[i]);
  const mevents=[]; if(rules.milestoneEnabled){ g.players.forEach((p,i)=>{ if(afterGin[i]>rules.milestoneThreshold){ const before=(i-1+g.players.length)%g.players.length; mevents.push({passer:i,victim:before}); } }); }
  return {pen,events,mpen,mevents,totals};
}

/* ---------- live game ---------- */
function baseTotal(pid){return active.scores[pid].reduce((a,v)=>a+(v||0),0);}
function netTotal(pid){return baseTotal(pid)+(curPen.pen[pid]||0);}
function nameOf(pid){const p=active.players.find(x=>x.id===pid);return p?p.name:"";}
function anyScored(){return active.players.some(p=>active.scores[p.id].some(v=>v!==null));}
function leadSet(){
  if(!anyScored()) return new Set();           // no crown before any score is entered
  const tots=active.players.map(p=>netTotal(p.id)); const best=bestOf(tots);
  return new Set(active.players.filter(p=>netTotal(p.id)===best).map(p=>p.id));
}
function roundsPlayed(){
  let n=0; for(let r=0;r<active.rounds;r++){ if(active.players.some(p=>active.scores[p.id][r]!==null||active.gins[p.id][r])) n++; } return n;
}

function refreshTotals(changedPid){
  const lead=leadSet();
  active.players.forEach(p=>{
    const t=netTotal(p.id);
    const totEl=document.querySelector(`[data-tot="${p.id}"]`);
    if(totEl){ if(totEl.textContent!=String(t)&&p.id===changedPid){totEl.classList.remove("bump");void totEl.offsetWidth;totEl.classList.add("bump");} totEl.textContent=t; }

/* ---------- leaderboard ---------- */
function leaderboardHTML(){
  const games=gamesInLeague();
  if(!games.length) return emptyHTML("♛", leagueState.current==="all"?"No standings yet":"No standings in this league", leagueState.current==="all"?"Play a few games and everyone gets ranked here by wins, win rate and average score.":`Play some games under “${esc(leagueName(leagueState.current))}” and its table builds here.`);
  const tbl={};
  games.forEach(g=>{
    const {totals}=finalTotals(g);
    const best=bestOf(totals), worst=worstOf(totals), hasBottom=rules.bottomTitles && totals.some(t=>t!==best);
    const winLC=g.winners.map(w=>w.toLowerCase());
    g.players.forEach((p,i)=>{
      const key=p.name.toLowerCase();
      const t=tbl[key]||(tbl[key]={name:p.name,suit:p.suit,games:0,wins:0,total:0,bestRound:0,gins:0,bottoms:0,deepBottoms:0});
      t.games++; t.total+=totals[i];
      const br=Math.max(0,...p.rounds.map(v=>v||0)); t.bestRound=Math.max(t.bestRound,br);
      if(p.gins) t.gins+=p.gins.filter(Boolean).length;
      if(totals[i]===best && winLC.includes(key)) t.wins++;
      if(hasBottom && totals[i]===worst){ t.bottoms++; if(worst<0) t.deepBottoms++; }
    });
  });
  const rows=Object.values(tbl).map(t=>({...t,avg:t.total/t.games,rate:t.wins/t.games}))
    .sort((a,b)=>b.wins-a.wins||b.rate-a.rate||b.avg-a.avg);
  return `<table class="lb"><thead><tr>
      <th class="rank">#</th><th>Player</th><th>Wins</th>
      <th class="hide-sm">Games</th><th>Win&nbsp;%</th><th>Avg</th><th class="hide-sm">Gins</th><th class="hide-sm">Bottom</th>
    </tr></thead><tbody>${rows.map((t,i)=>{const s=SUITS[t.suit];
      return `<tr class="${i===0?"first":""}">
        <td class="rank"><span class="rk">${i+1}</span></td>
        <td><span class="player"><span class="su" style="${s.k==='red'?'color:var(--red)':'color:var(--brass-soft)'}">${s.c}</span><span class="nm">${esc(t.name)}</span></span></td>
        <td><span class="wins">${t.wins}</span></td>
        <td class="dim hide-sm">${t.games}</td>
        <td class="dim">${Math.round(t.rate*100)}%</td>
        <td class="dim">${t.avg.toFixed(0)}</td>
        <td class="dim hide-sm">${t.gins}</td>
        <td class="dim hide-sm">${t.bottoms}${t.deepBottoms?` <span style="color:#e6857f;font-size:11px">·${t.deepBottoms} deep</span>`:""}</td>
      </tr>`;}).join("")}</tbody></table>`;
}

/* ---------- utils ---------- */
function emptyHTML(icon,title,body){return `<div class="empty"><div class="big">${icon}</div><strong>${title}</strong><p>${body}</p></div>`;}
function fmtDate(ts){const d=new Date(ts),now=new Date();const t=d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
  if(d.toDateString()===now.toDateString())return "Today · "+t;
  return d.toLocaleDateString([],{month:"short",day:"numeric"})+" · "+t;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function askConfirm({title,body,confirmText="Confirm",danger=false}){
  return new Promise(resolve=>{
    const wrap=document.createElement("div"); wrap.className="modal";
    wrap.innerHTML=`<div class="mcard"><h3>${esc(title)}</h3>${body?`<p>${esc(body)}</p>`:""}<div class="mbtns"><button class="btn btn-ghost" data-no>Cancel</button><button class="btn ${danger?"btn-danger":"btn-primary"}" data-yes>${esc(confirmText)}</button></div></div>`;
    document.body.appendChild(wrap);
    const close=v=>{ wrap.remove(); resolve(v); };
    wrap.querySelector("[data-yes]").onclick=()=>close(true);
    wrap.querySelector("[data-no]").onclick=()=>close(false);
    wrap.onclick=e=>{ if(e.target===wrap) close(false); };
  });
}
</script>
